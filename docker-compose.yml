services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kiosk
      POSTGRES_PASSWORD: kiosk
      POSTGRES_DB: kiosk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiosk -d kiosk"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://kiosk:kiosk@db:5432/kiosk
      REDIS_URL: redis://redis:6379
      PORT: "3000"
      JWT_SECRET: dev-docker-secret-change-in-production
      JWT_EXPIRES_IN: 7d
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
